name: Build DersaneAI APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write  # Release oluşturmak için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Gradle wrapper
      run: gradle wrapper --gradle-version 8.4

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace --no-daemon
      env:
        GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2048m"

    - name: Find APK
      id: find_apk
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "APK: $APK_PATH"
        ls -lh "$APK_PATH"

    - name: Rename APK
      run: |
        mkdir -p release
        cp "${{ steps.find_apk.outputs.apk_path }}" release/dersaneai.apk
        ls -lh release/

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: dersaneai-apk
        path: release/dersaneai.apk
        retention-days: 90

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: DersaneAI v1.0.${{ github.run_number }}
        body: |
          Otomatik build — #${{ github.run_number }}

          ## 📥 İndirme
          Aşağıdaki **dersaneai.apk** dosyasını indir ve Android telefonuna yükle.

          ## 🔧 Kurulum
          1. APK'yı indir
          2. Telefonda "Bilinmeyen kaynak" izni ver
          3. Yükle
          4. İlk açılışta dershanenin sunucu adresini gir (örn: http://192.168.1.6:8765/)
          5. Hazır!
        files: release/dersaneai.apk
        draft: false
        prerelease: false
