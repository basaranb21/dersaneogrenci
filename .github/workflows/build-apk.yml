name: Build DersaneAI APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manuel tetikleme

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      continue-on-error: true

    - name: Generate Gradle wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
        fi

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Rename APK
      run: |
        mkdir -p release
        cp app/build/outputs/apk/release/app-release.apk release/dersaneai.apk
        ls -lh release/

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: dersaneai-apk
        path: release/dersaneai.apk
        retention-days: 90

    - name: Create Release (on push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: DersaneAI v1.0.${{ github.run_number }}
        body: |
          Otomatik build — #${{ github.run_number }}

          ## 📥 İndirme
          Aşağıdaki **dersaneai.apk** dosyasını indir ve Android telefonuna yükle.

          ## 🔧 Kurulum
          1. APK'yı indir
          2. Telefonda "Bilinmeyen kaynak" izni ver
          3. Yükle
          4. İlk açılışta dershanenin sunucu adresini gir (örn: http://192.168.1.6:8765/)
          5. Hazır!
        files: release/dersaneai.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
